<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" role="img" aria-label="Blacksmith chibi — Flash Blacksloth">
  <title>Flash Blacksloth — Blacksmith</title>
  <!-- shadow -->
  <ellipse cx="60" cy="118" rx="38" ry="10" fill="#3f3f46" opacity="0.2"/>
  <!-- head -->
  <circle cx="60" cy="68" r="44" fill="#a8a29e" stroke="#57534e" stroke-width="3"/>
  <!-- sloth eye patches (dark circles) -->
  <ellipse cx="44" cy="62" rx="14" ry="12" fill="#57534e" opacity="0.5"/>
  <ellipse cx="76" cy="62" rx="14" ry="12" fill="#57534e" opacity="0.5"/>
  <!-- eyes — half-lidded sloth look -->
  <ellipse cx="44" cy="64" rx="6" ry="4" fill="#1e1b4b"/>
  <ellipse cx="76" cy="64" rx="6" ry="4" fill="#1e1b4b"/>
  <circle cx="45" cy="63" r="2" fill="#fff"/>
  <circle cx="77" cy="63" r="2" fill="#fff"/>
  <!-- sleepy eyelids -->
  <path d="M36 60 Q44 56 52 60" fill="#a8a29e" stroke="#57534e" stroke-width="1.5"/>
  <path d="M68 60 Q76 56 84 60" fill="#a8a29e" stroke="#57534e" stroke-width="1.5"/>
  <!-- nose -->
  <ellipse cx="60" cy="78" rx="5" ry="3.5" fill="#57534e"/>
  <!-- slow smile -->
  <path d="M50 84 Q60 92 70 84" fill="none" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- body (apron) -->
  <rect x="28" y="98" width="64" height="28" rx="8" fill="#57534e" stroke="#292524" stroke-width="2"/>
  <!-- hammer icon on apron -->
  <rect x="54" y="104" width="12" height="4" rx="1" fill="#fbbf24"/>
  <rect x="58" y="104" width="4" height="14" rx="1" fill="#78716c"/>
</svg>
