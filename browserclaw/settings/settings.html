<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browserclaw — Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="bc-settings">
      <header class="bc-settings__header">
        <h1 class="bc-settings__title">Browserclaw settings</h1>
      </header>

      <form id="bc-settings-form" class="bc-settings__form">
        <fieldset class="bc-fieldset">
          <legend class="bc-legend">Pigeon Post</legend>

          <label class="bc-label bc-label--row">
            <input type="checkbox" id="bc-auto-pilot" name="autoPilot" />
            <span>Executing pigeon letters</span>
          </label>

          <label class="bc-label bc-label--top" for="bc-guildos-base-url">GuildOS base URL</label>
          <input
            type="text"
            id="bc-guildos-base-url"
            class="bc-input-wide"
            spellcheck="false"
            autocomplete="off"
            placeholder="http://localhost:3002"
            aria-label="GuildOS base URL"
          />

          <label class="bc-label bc-label--top" for="bc-pigeon-api-key">Pigeon API key</label>
          <input
            type="password"
            id="bc-pigeon-api-key"
            class="bc-input-wide"
            spellcheck="false"
            autocomplete="off"
            aria-label="Pigeon API key"
          />
        </fieldset>

        <button type="submit" class="bc-save">Save</button>
      </form>
      <p id="bc-settings-status" class="bc-status" aria-live="polite"></p>

      <section id="bc-letters-section" class="bc-letters-section" style="display:none">
        <div class="bc-letters-head">
          <span class="bc-letters-title">Pending letters</span>
          <button type="button" id="bc-letters-refresh" class="bc-refresh-btn">Refresh</button>
        </div>
        <div id="bc-letters-list" class="bc-letters-list" aria-live="polite">Loading…</div>
      </section>
    </div>
    <script src="../shared/constants.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
