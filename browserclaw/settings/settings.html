<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browserclaw — Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="bc-settings">
      <header class="bc-settings__header">
        <h1 class="bc-settings__title">Browserclaw settings</h1>
      </header>

      <form id="bc-settings-form" class="bc-settings__form">
        <fieldset class="bc-fieldset">
          <legend class="bc-legend">Pigeon Post</legend>

          <label class="bc-label bc-label--row">
            <input type="checkbox" id="bc-auto-pilot" name="autoPilot" />
            <span>Executing pigeon letters</span>
          </label>

          <label class="bc-label bc-label--top" for="bc-guildos-base-url">GuildOS base URL</label>
          <input
            type="text"
            id="bc-guildos-base-url"
            class="bc-input-wide"
            spellcheck="false"
            autocomplete="off"
            placeholder="http://localhost:3002"
            aria-label="GuildOS base URL"
          />

          <label class="bc-label bc-label--top" for="bc-pigeon-api-key">Pigeon API key</label>
          <input
            type="password"
            id="bc-pigeon-api-key"
            class="bc-input-wide"
            spellcheck="false"
            autocomplete="off"
            aria-label="Pigeon API key"
          />
        </fieldset>

        <button type="submit" class="bc-save">Save</button>
      </form>
      <p id="bc-settings-status" class="bc-status" aria-live="polite"></p>

      <section id="bc-letters-section" class="bc-letters-section" style="display:none">
        <div class="bc-letters-head">
          <span class="bc-letters-title">Pending letters</span>
          <button type="button" id="bc-letters-refresh" class="bc-refresh-btn">Refresh</button>
        </div>
        <div id="bc-letters-list" class="bc-letters-list" aria-live="polite">Loading…</div>

        <div id="bc-exec-controls" class="bc-exec-controls" style="display:none">
          <div class="bc-exec-toolbar">
            <button type="button" id="bc-do-next" class="bc-do-next-btn">&#9654; Do next step</button>
            <label class="bc-label bc-label--row bc-auto-exec-label">
              <input type="checkbox" id="bc-auto-exec" />
              <span>Auto execute</span>
            </label>
          </div>
          <p id="bc-exec-status" class="bc-exec-status" aria-live="polite"></p>
        </div>
      </section>
    </div>
    <script src="../shared/constants.js"></script>
    <script src="settings.js"></script>
    <!-- Cookie export for automation: auto-populates on load, readable via javascript_tool -->
    <pre id="bc-cookie-dump" data-ready="0" style="display:none"></pre>
    <script>
      chrome.runtime.sendMessage({ type: "GET_COOKIES", domain: ".google.com" }, function(res) {
        var el = document.getElementById("bc-cookie-dump");
        if (!el) return;
        if (chrome.runtime.lastError || !res || !res.ok) {
          el.textContent = JSON.stringify({ error: (chrome.runtime.lastError && chrome.runtime.lastError.message) || (res && res.error) || "unknown" });
        } else {
          el.textContent = JSON.stringify(res.cookies.map(function(c) {
            return { name: c.name, value: c.value, domain: c.domain, path: c.path, httpOnly: c.httpOnly, secure: c.secure };
          }));
        }
        el.setAttribute("data-ready", "1");
      });
    </script>
  </body>
</html>
